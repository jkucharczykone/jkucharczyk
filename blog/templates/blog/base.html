{% load bootstrap4 %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% bootstrap_css %}
    {% bootstrap_javascript jquery='full' %}
    {% bootstrap_messages %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static "css/blog.css" %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3>JK blog</h3>
            </div>
            <ul class="list-unstyled">
                <li id="all-posts" class="active">
                    <a href="{% url 'blog:post_list' %}">Wszystkie posty</a>
                </li>
            </ul>
        </nav>
        <div id="content" class="container">
            {% block content %}
            {% endblock %}
        </div>
    </div>
    <span id="sidebarCollapse" class="material-icons noselect">donut_large</span>
</body>
<script>
    var sideActive=1
    $(document).ready(function () {
    $('#sidebarCollapse').on('click', function () {
        $('#sidebar').toggleClass('active');
        if (sideActive==0){
            $('#sidebarCollapse').text("donut_large")
            sideActive=1
        }
        else if (sideActive==1){
            $('#sidebarCollapse').text("donut_small")
            sideActive=0
        }
    });
    $(".post-href").on('click', ()=>{
        $("#all-posts").toggleClass('active');
    })
    });
</script>
</html>
