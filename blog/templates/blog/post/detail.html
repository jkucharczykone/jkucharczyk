{% extends "blog/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <div id="post-body">
        {{ post.body|linebreaks }}
    </div>
    <p class="date">
        Opublikowany {{ post.publish }} przez {{ post.author }}
    </p>
    <script>
        $(document).ready(function () {
            $("#all-posts").removeClass('active');
        });
    </script>
{% endblock %}
