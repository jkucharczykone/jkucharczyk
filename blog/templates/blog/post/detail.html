{% extends "blog/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <h1>{{ post.title }}</h1>
    <div id="post-body">
        {{ post.body|linebreaks }}
    </div>
    <p class="date">
        Opublikowany {{ post.publish }} przez {{ post.author }}
    </p>
    <p>
        <a class="btn btn-info" href="{% url "blog:post_share" post.id %}">
            Udostępnij post
        </a>
    </p>
{% endblock %}
