{% extends "blog/base.html" %}

{% block title %}Mój blog{% endblock %}

{% block content %}
    <h1>Mój blog</h1>
    {% for post in posts %}
    <h2>
        <a href="{{ post.get_absolute_url }}" class="post-href">
            {{ post.title }}
        </a>
    </h2>
    <div class="post-body">
    {{ post.body|truncatewords:30|linebreaks }}
    </div>
    <p class="date">
        Opublikowany {{ post.published }} przez {{ post.author }}
    </p>
    {% endfor %}
{% endblock %}
